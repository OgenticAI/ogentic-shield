version: "0.1"

profiles:
  - shield-legal
  - shield-therapy

layers:
  regex: true
  ner: true
  rules: true
  llm:
    enabled: false
    provider: ollama
    # Empty model = use ModelRegistry default for `quality` (granite3.1-moe:1b
    # for "fast"). Set explicitly to override the registry recommendation.
    model: ""
    quality: fast            # fast | quality | comprehensive
    endpoint: http://localhost:11434
    timeout_ms: 5000
    max_retries: 2
    ambiguous_score_range: [20, 60]

scoring:
  min_confidence: 0.5
  dedup_strategy: longest_highest

output:
  include_text_hash: true
  include_processing_time: true
  max_entities: 50

custom_profiles_dir: ./profiles
