version: "0.1"

profiles:
  - shield-legal
  - shield-therapy

layers:
  regex: true
  ner: true
  rules: true
  llm:
    enabled: false
    provider: ollama
    model: llama3.1:8b
    endpoint: http://localhost:11434
    timeout_ms: 5000
    ambiguous_score_range: [20, 60]

scoring:
  min_confidence: 0.5
  dedup_strategy: longest_highest

output:
  include_text_hash: true
  include_processing_time: true
  max_entities: 50

# Audit emission for chain-of-custody (OGE-316).
# backend: null (default, no-op) | stderr | file
# Events carry only the input hash, never the raw text.
audit:
  backend: null
  # path: /var/log/shield-audit.jsonl   # required when backend == "file"

custom_profiles_dir: ./profiles
