# Self-hosted UAT override flow — fires on PR comments containing /uat-override.
#
# Consumers should mirror this file in their own repo (see docs/INSTALL.md).
# We dogfood it here so every override on agent-reviewer's own PRs runs
# through the same code path as a real consumer's.

name: OgenticAI Reviewer — UAT Override

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write

jobs:
  override:
    # Only run on comments that look like the slash command. The CLI
    # re-validates and is the source of truth, but a cheap regex here
    # avoids spinning up a runner for every non-override comment.
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/uat-override')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: OgenticAI/agent-reviewer/.github/actions/override@v2
        with:
          github_app_id: ${{ secrets.OGENTICAI_REVIEWER_APP_ID }}
          github_app_private_key: ${{ secrets.OGENTICAI_REVIEWER_APP_KEY }}
          linear_api_token: ${{ secrets.LINEAR_API_TOKEN }}
